version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: product_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret

  redis:
    image: redis:alpine
    container_name: product_redis
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
